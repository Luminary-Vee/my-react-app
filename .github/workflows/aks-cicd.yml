name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: prodetereg1
  IMAGE_NAME: my-react-app
  RESOURCE_GROUP: aks-project
  AKS_CLUSTER: aks-prodete

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Login to ACR
      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      # 4. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .
          docker tag $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      # 5. Push Docker image
      - name: Push Docker image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      # 6. Get AKS credentials
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      # 7. Deploy to AKS
      - name: Deploy to AKS
        run: |
          kubectl set image deployment/react-app \
          react-app=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      # 8. Verify rollout
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/react-app